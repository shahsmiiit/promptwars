events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Efficiency: Enable Gzip compression 
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    # Security: Add strict HTTP response headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # Content Security Policy (Basic SPA defaults)
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:;" always;

    server {
        # Cloud Run sets the PORT environment variable
        # We use a trick in the Dockerfile (envsubst) to replace the port at runtime
        listen ${PORT};
        server_name _;
        
        root /usr/share/nginx/html;
        index index.html;

        # Serve static files, if not found then serve index.html (SPA routing)
        location / {
            try_files $uri /index.html;
        }

        # Cache control for static assets (optional but good practice)
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public";
        }
    }
}
